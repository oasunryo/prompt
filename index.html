<!DOCTYPE html>
<html lang="ko" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오성후의 질문 해석</title>
  <meta name="description" content="비즈니스·면접에서 자주 나오는 질문 50개, 신입의 시선으로 읽는 숨은 의도와 답변 스크립트">
  <meta property="og:title" content="오성후의 질문 해석">
  <meta property="og:description" content="이 질문, 저는 이렇게 들었어요. 비즈니스 질문 50개 완전 해석">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root,
    [data-theme="light"] {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #ffffff;
      --color-surface-offset: #f0ede8;
      --color-divider: #e0ddd8;
      --color-border: rgba(40, 37, 29, 0.12);
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-text-faint: #bab9b4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-highlight: #cedcd8;
      --color-navy: #1a2744;
      --shadow-sm: 0 1px 2px rgba(40, 37, 29, 0.06);
      --shadow-md: 0 4px 12px rgba(40, 37, 29, 0.08);
      --shadow-lg: 0 12px 32px rgba(40, 37, 29, 0.12);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --font-display: 'Noto Serif KR', Georgia, serif;
      --font-body: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-20: 5rem;
      --space-24: 6rem;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --cat-면접: #01696f;
      --cat-면접-hl: #cedcd8;
      --cat-직장: #2a5d85;
      --cat-직장-hl: #d4e2ed;
      --cat-관계: #b75d32;
      --cat-관계-hl: #ebd4ca;
      --cat-협상: #6a4a75;
      --cat-협상-hl: #e0d5e3;
      --cat-자기표현: #4b7a43;
      --cat-자기표현-hl: #d8e6d5;
    }

    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #222120;
      --color-surface-offset: #1d1c1a;
      --color-divider: #262523;
      --color-border: rgba(205, 204, 202, 0.1);
      --color-text: #cdccca;
      --color-text-muted: #797876;
      --color-text-faint: #5a5957;
      --color-primary: #4f98a3;
      --color-primary-hover: #227f8b;
      --color-primary-highlight: #313b3b;
      --color-navy: #8ba3d4;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.4);
      --cat-면접: #4f98a3;
      --cat-면접-hl: #313b3b;
      --cat-직장: #6ba0c9;
      --cat-직장-hl: #2b3b4a;
      --cat-관계: #d48c6a;
      --cat-관계-hl: #4a342a;
      --cat-협상: #9f7eb0;
      --cat-협상-hl: #3d3145;
      --cat-자기표현: #82b07a;
      --cat-자기표현-hl: #32422e;
    }

    @media(prefers-color-scheme:dark) {
      :root:not([data-theme]) {
        --color-bg: #171614;
        --color-surface: #1c1b19;
        --color-surface-2: #222120;
        --color-surface-offset: #1d1c1a;
        --color-divider: #262523;
        --color-border: rgba(205, 204, 202, 0.1);
        --color-text: #cdccca;
        --color-text-muted: #797876;
        --color-text-faint: #5a5957;
        --color-primary: #4f98a3;
        --color-primary-hover: #227f8b;
        --color-primary-highlight: #313b3b;
        --color-navy: #8ba3d4;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.4);
        --cat-면접: #4f98a3;
        --cat-면접-hl: #313b3b;
        --cat-직장: #6ba0c9;
        --cat-직장-hl: #2b3b4a;
        --cat-관계: #d48c6a;
        --cat-관계-hl: #4a342a;
        --cat-협상: #9f7eb0;
        --cat-협상-hl: #3d3145;
        --cat-자기표현: #82b07a;
        --cat-자기표현-hl: #32422e;
      }
    }

    .cat-면접 {
      --theme-color: var(--cat-면접);
      --theme-highlight: var(--cat-면접-hl);
    }

    .cat-직장 {
      --theme-color: var(--cat-직장);
      --theme-highlight: var(--cat-직장-hl);
    }

    .cat-관계 {
      --theme-color: var(--cat-관계);
      --theme-highlight: var(--cat-관계-hl);
    }

    .cat-협상 {
      --theme-color: var(--cat-협상);
      --theme-highlight: var(--cat-협상-hl);
    }

    .cat-자기표현 {
      --theme-color: var(--cat-자기표현);
      --theme-highlight: var(--cat-자기표현-hl);
    }

    .cat-all {
      --theme-color: var(--color-primary);
      --theme-highlight: var(--color-primary-highlight);
    }

    html {
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
      scroll-padding-top: 80px
    }

    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background: var(--color-bg);
      min-height: 100dvh;
      line-height: 1.7
    }

    img,
    picture,
    video,
    canvas,
    svg {
      display: block;
      max-width: 100%;
      height: auto
    }

    button {
      cursor: pointer;
      background: none;
      border: none;
      font: inherit;
      color: inherit
    }

    a,
    button,
    [role="button"] {
      transition: color var(--transition), background var(--transition), border-color var(--transition), box-shadow var(--transition)
    }

    h1,
    h2,
    h3,
    h4 {
      text-wrap: balance;
      line-height: 1.2
    }

    p,
    li {
      text-wrap: pretty;
      max-width: 72ch
    }

    ::selection {
      background: oklch(from var(--color-primary) l c h / 0.2);
      color: var(--color-text)
    }

    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: var(--radius-sm)
    }

    @media(prefers-reduced-motion:reduce) {

      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important
      }
    }

    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px)
    }

    .header-inner {
      max-width: 1100px;
      margin-inline: auto;
      padding: var(--space-4) var(--space-6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4)
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      text-decoration: none;
      color: var(--color-text)
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      flex-shrink: 0
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: -0.01em
    }

    .logo-sub {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      font-weight: 400
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-3)
    }

    .theme-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      color: var(--color-text-muted)
    }

    .theme-btn:hover {
      background: var(--color-surface-offset);
      color: var(--color-text)
    }

    .insta-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: var(--color-primary);
      color: #fff;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      text-decoration: none
    }

    .insta-btn:hover {
      background: var(--color-primary-hover)
    }

    /* HERO */
    .hero {
      padding: clamp(var(--space-16), 8vw, var(--space-24)) var(--space-6);
      text-align: center;
      max-width: 760px;
      margin-inline: auto
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--color-primary-highlight);
      color: var(--color-primary);
      font-size: var(--text-xs);
      font-weight: 600;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      margin-bottom: var(--space-6);
      letter-spacing: 0.04em
    }

    .hero h1 {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: var(--space-4);
      letter-spacing: -0.02em
    }

    .hero h1 em {
      font-style: normal;
      color: var(--color-primary)
    }

    .hero p {
      font-size: var(--text-base);
      color: var(--color-text-muted);
      max-width: 52ch;
      margin-inline: auto;
      line-height: 1.8
    }

    .hero-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-8);
      margin-top: var(--space-10);
      padding-top: var(--space-8);
      border-top: 1px solid var(--color-border)
    }

    .stat-item {
      text-align: center
    }

    .stat-num {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--color-primary);
      display: block
    }

    .stat-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted)
    }

    /* FILTER */
    .filter-bar {
      position: sticky;
      top: 65px;
      z-index: 90;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-3) var(--space-6)
    }

    .filter-inner {
      max-width: 1100px;
      margin-inline: auto;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none
    }

    .filter-inner::-webkit-scrollbar {
      display: none
    }

    .filter-btn {
      flex-shrink: 0;
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 500;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      background: var(--color-surface);
      white-space: nowrap;
      cursor: pointer;
      transition: all var(--transition)
    }

    .filter-btn:hover {
      border-color: var(--theme-color, var(--color-primary));
      color: var(--theme-color, var(--color-primary))
    }

    .filter-btn.active {
      background: var(--theme-color, var(--color-primary));
      color: #fff;
      border-color: var(--theme-color, var(--color-primary))
    }

    .search-wrap {
      position: relative;
      margin-left: auto;
      flex-shrink: 0
    }

    .search-input {
      padding: var(--space-2) var(--space-4) var(--space-2) var(--space-8);
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      font-size: var(--text-xs);
      color: var(--color-text);
      width: 200px;
      outline: none
    }

    .search-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-highlight)
    }

    .search-icon {
      position: absolute;
      left: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-faint);
      pointer-events: none
    }

    /* MAIN GRID */
    .main {
      max-width: 1100px;
      margin-inline: auto;
      padding: var(--space-8) var(--space-6) var(--space-24)
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
      padding-top: var(--space-8)
    }

    .section-title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--color-text)
    }

    .section-count {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      font-weight: 500
    }

    .questions-grid {
      display: grid;
      gap: var(--space-4);
      grid-template-columns: repeat(auto-fill, minmax(min(500px, 100%), 1fr))
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: box-shadow var(--transition), transform var(--transition);
      cursor: pointer
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px)
    }

    .card-header {
      padding: var(--space-5) var(--space-6);
      display: flex;
      align-items: flex-start;
      gap: var(--space-4)
    }

    .card-num {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--theme-color, var(--color-primary));
      background: var(--theme-highlight, var(--color-primary-highlight));
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px
    }

    .card-meta {
      flex: 1;
      min-width: 0
    }

    .card-category {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: var(--space-1)
    }

    .card-question {
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.4
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-3)
    }

    .card-tag {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.75rem;
      padding: 0.125rem 0.375rem;
      border-radius: var(--radius-sm);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .tag-숨은의도 {
      color: #e53935;
      background: rgba(229, 57, 53, 0.1);
    }

    .tag-자기표현 {
      color: #f57c00;
      background: rgba(245, 124, 0, 0.1);
    }

    .tag-관계신호 {
      color: #d4a106;
      background: rgba(212, 161, 6, 0.1);
    }

    .tag-업무체크 {
      color: #7cb342;
      background: rgba(124, 179, 66, 0.15);
    }

    .tag-신뢰테스트 {
      color: #388e3c;
      background: rgba(56, 142, 60, 0.1);
    }

    .tag-설득국면 {
      color: #00897b;
      background: rgba(0, 137, 123, 0.1);
    }

    .tag-가치관질문 {
      color: #1e88e5;
      background: rgba(30, 136, 229, 0.1);
    }

    .tag-경험질문 {
      color: #3949ab;
      background: rgba(57, 73, 171, 0.1);
    }

    .tag-첫인상 {
      color: #8e24aa;
      background: rgba(142, 36, 170, 0.1);
    }

    .tag-마무리순간 {
      color: #d81b60;
      background: rgba(216, 27, 96, 0.1);
    }

    [data-theme="dark"] .tag-숨은의도 {
      color: #ef9a9a;
      background: rgba(239, 154, 154, 0.15);
    }

    [data-theme="dark"] .tag-자기표현 {
      color: #ffcc80;
      background: rgba(255, 204, 128, 0.15);
    }

    [data-theme="dark"] .tag-관계신호 {
      color: #ffe082;
      background: rgba(255, 224, 130, 0.15);
    }

    [data-theme="dark"] .tag-업무체크 {
      color: #c5e1a5;
      background: rgba(197, 225, 165, 0.15);
    }

    [data-theme="dark"] .tag-신뢰테스트 {
      color: #a5d6a7;
      background: rgba(165, 214, 167, 0.15);
    }

    [data-theme="dark"] .tag-설득국면 {
      color: #80cbc4;
      background: rgba(128, 203, 196, 0.15);
    }

    [data-theme="dark"] .tag-가치관질문 {
      color: #90caf9;
      background: rgba(144, 202, 249, 0.15);
    }

    [data-theme="dark"] .tag-경험질문 {
      color: #9fa8da;
      background: rgba(159, 168, 218, 0.15);
    }

    [data-theme="dark"] .tag-첫인상 {
      color: #ce93d8;
      background: rgba(206, 147, 216, 0.15);
    }

    [data-theme="dark"] .tag-마무리순간 {
      color: #f48fb1;
      background: rgba(244, 143, 177, 0.15);
    }

    @media(prefers-color-scheme:dark) {
      :root:not([data-theme]) .tag-숨은의도 {
        color: #ef9a9a;
        background: rgba(239, 154, 154, 0.15);
      }

      :root:not([data-theme]) .tag-자기표현 {
        color: #ffcc80;
        background: rgba(255, 204, 128, 0.15);
      }

      :root:not([data-theme]) .tag-관계신호 {
        color: #ffe082;
        background: rgba(255, 224, 130, 0.15);
      }

      :root:not([data-theme]) .tag-업무체크 {
        color: #c5e1a5;
        background: rgba(197, 225, 165, 0.15);
      }

      :root:not([data-theme]) .tag-신뢰테스트 {
        color: #a5d6a7;
        background: rgba(165, 214, 167, 0.15);
      }

      :root:not([data-theme]) .tag-설득국면 {
        color: #80cbc4;
        background: rgba(128, 203, 196, 0.15);
      }

      :root:not([data-theme]) .tag-가치관질문 {
        color: #90caf9;
        background: rgba(144, 202, 249, 0.15);
      }

      :root:not([data-theme]) .tag-경험질문 {
        color: #9fa8da;
        background: rgba(159, 168, 218, 0.15);
      }

      :root:not([data-theme]) .tag-첫인상 {
        color: #ce93d8;
        background: rgba(206, 147, 216, 0.15);
      }

      :root:not([data-theme]) .tag-마무리순간 {
        color: #f48fb1;
        background: rgba(244, 143, 177, 0.15);
      }
    }

    .card-toggle {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-faint);
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      transition: transform var(--transition), color var(--transition)
    }

    .card.open .card-toggle {
      transform: rotate(180deg);
      color: var(--theme-color, var(--color-primary))
    }

    .card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1)
    }

    .card.open .card-body {
      max-height: 600px
    }

    .card-inner {
      padding: 0 var(--space-6) var(--space-6);
      padding-top: 0
    }

    .divider {
      height: 1px;
      background: var(--color-divider);
      margin-bottom: var(--space-5)
    }

    .answer-block {
      margin-bottom: var(--space-4)
    }

    .answer-label {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: var(--space-2)
    }

    .label-general {
      color: var(--color-text-faint)
    }

    .label-oseonghu {
      color: var(--theme-color, var(--color-primary))
    }

    .answer-text {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.8;
      padding: var(--space-3) var(--space-4);
      background: var(--color-surface-offset);
      border-radius: var(--radius-md)
    }

    .answer-text.highlight {
      background: var(--theme-highlight, var(--color-primary-highlight));
      color: var(--color-text)
    }

    .intent-tag {
      display: inline-block;
      font-size: var(--text-xs);
      color: var(--theme-color, var(--color-primary));
      background: var(--theme-highlight, var(--color-primary-highlight));
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      margin-bottom: var(--space-3);
      font-weight: 500
    }

    /* NO RESULTS */
    .no-results {
      text-align: center;
      padding: var(--space-20) var(--space-6);
      color: var(--color-text-muted)
    }

    .no-results p {
      font-size: var(--text-base);
      margin-top: var(--space-2)
    }

    /* FOOTER */
    .footer {
      border-top: 1px solid var(--color-border);
      padding: var(--space-10) var(--space-6);
      text-align: center
    }

    .footer-inner {
      max-width: 1100px;
      margin-inline: auto
    }

    .footer-logo {
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: var(--space-2)
    }

    .footer-sub {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      line-height: 1.8
    }

    /* RESPONSIVE */
    @media(max-width:600px) {
      .header-inner {
        padding: var(--space-3) var(--space-4)
      }

      .hero {
        padding: var(--space-12) var(--space-4)
      }

      .filter-bar {
        padding: var(--space-3) var(--space-4)
      }

      .main {
        padding: var(--space-6) var(--space-4) var(--space-16)
      }

      .hero-stats {
        gap: var(--space-5)
      }

      .questions-grid {
        grid-template-columns: 1fr
      }

      .card-header {
        padding: var(--space-4) var(--space-4)
      }

      .card-inner {
        padding: 0 var(--space-4) var(--space-4)
      }
    }
  </style>
</head>

  <script>
    const questions = [
      // 면접
      { id: 1, cat: "면접", q: "본인의 단점이 뭐예요?", general: "성격이 급한 편이지만, 고치려고 노력하고 있어요.", intent: "사실 면접관이 듣고 싶은 건 '이 사람이 자기 자신을 얼마나 솔직하게 볼 수 있는가'예요. 단점을 장점으로 포장하면 오히려 감점이에요.", oseonghu: "저는 완성도에 집착해서 혼자 오래 붙잡고 있는 경향이 있어요. 그래서 요즘은 일단 '보여줄 수 있는 버전'을 먼저 만들고, 피드백을 받으며 다듬는 방식으로 바꾸고 있어요.", tags: ["숨은의도", "자기표현"] },
      { id: 2, cat: "면접", q: "10년 후 어떤 사람이 되고 싶으세요?", general: "이 분야의 전문가가 되어 회사에 기여하고 싶습니다.", intent: "커리어 로드맵이나 성과 기대치가 아니라 '이 사람이 성장 의지가 있는가, 우리 회사와 방향이 맞는가'를 보는 거예요.", oseonghu: "제가 모르는 걸 당연하게 물어볼 수 있는 환경에서, 10년 뒤엔 제가 누군가의 '당연하게 물어볼 수 있는 선배'가 되고 싶어요.", tags: ["가치관질문", "자기표현"] },
      { id: 3, cat: "면접", q: "왜 우리 회사에 지원했나요?", general: "귀사의 비전과 성장 가능성에 끌려서 지원했습니다.", intent: "'이 사람이 우리 회사를 제대로 알고 왔는가'를 보는 거예요. 구체성이 없으면 어느 회사 면접에나 쓸 수 있는 답이 돼요.", oseonghu: "솔직히 말하면, 처음엔 이름보다 하는 일이 마음에 들었어요. [구체적인 업무/제품 언급]. 찾아보면 볼수록, 여기서 배운 것이 오래 남을 것 같다는 확신이 생겼어요.", tags: ["숨은의도", "신뢰테스트"] },
      { id: 4, cat: "면접", q: "팀 프로젝트에서 갈등이 생겼을 때 어떻게 했나요?", general: "서로 대화로 해결했고, 결국 잘 마무리됐어요.", intent: "갈등을 피하지 않고 직면했는지, 그리고 팀을 망가뜨리지 않고 해결하는 방식을 갖고 있는지를 보고 있어요.", oseonghu: "갈등 자체보다 '말을 꺼내는 타이밍'이 어려웠어요. 저는 1:1로 먼저 물어봤어요. '나는 이렇게 이해했는데, 네 생각은 어때?'라는 식으로. 틀린 것보다 다른 것이라는 걸 확인하는 것부터 시작했어요.", tags: ["경험질문", "신뢰테스트"] },
      { id: 5, cat: "면접", q: "자기소개 해주세요.", general: "안녕하세요, 저는 ○○대학교 ○○학과를 졸업한 ○○○입니다.", intent: "1분 안에 '이 사람을 기억해야 할 이유'를 만들 수 있는지를 보는 거예요. 스펙 나열은 서류에서 이미 봤어요.", oseonghu: "저를 한 가지로 표현하면 '질문을 잘 듣는 사람'이에요. 상대가 뭘 묻는지 먼저 읽고, 그 다음에 말하는 습관이 있거든요. 오늘 이 자리도 그렇게 임하고 싶어요.", tags: ["첫인상", "자기표현"] },
      { id: 6, cat: "면접", q: "가장 힘들었던 경험이 뭐예요?", general: "졸업 논문을 쓰면서 정말 힘들었는데 끝까지 포기하지 않았어요.", intent: "힘든 상황에서 어떻게 행동했는지가 핵심이에요. 힘들었다는 사실보다 '그래서 어떻게 했는지'를 보고 있어요.", oseonghu: "제일 힘든 건 '내가 틀렸을 수도 있다'고 인정해야 할 때였어요. 그때 저는 일단 멈추고, 상대 입장에서 다시 생각해봤어요. 그게 더 빠르게 풀렸거든요.", tags: ["경험질문", "숨은의도"] },
      { id: 7, cat: "면접", q: "우리 회사에 대해 아는 대로 말해보세요.", general: "귀사는 ○○ 분야의 선두기업으로 최근 ○○ 사업을 확장하고 있는 걸로 알고 있습니다.", intent: "사전 조사를 얼마나 했는지, 그리고 그 정보를 자기 언어로 소화했는지를 보는 거예요.", oseonghu: "조사하다가 한 가지 궁금한 점이 생겼어요. [구체적 질문]. 이게 오늘 여기 온 이유 중 하나이기도 해요.", tags: ["신뢰테스트", "숨은의도"] },
      { id: 8, cat: "면접", q: "어떤 직원이 함께 일하기 어려우세요?", general: "소통이 안 되는 사람이요.", intent: "이 질문은 사실 '당신은 어떤 사람과 잘 일하는가', 즉 본인의 업무 스타일을 역으로 보는 거예요.", oseonghu: "말 없이 결론만 바꾸는 분이요. 저는 이유를 알아야 같은 실수를 안 하거든요. 근데 그런 분도 이유가 있을 거라 생각해서, 먼저 여쭤보는 편이에요.", tags: ["숨은의도", "가치관질문"] },
      { id: 9, cat: "면접", q: "실패 경험을 말해보세요.", general: "한 번은 발표 준비를 너무 늦게 시작해서 결과가 좋지 않았어요.", intent: "실패를 인정할 수 있는 사람인지, 그리고 거기서 무언가 가져온 사람인지를 보고 있어요.", oseonghu: "준비는 했는데 상대가 원하는 게 다른 걸 몰랐던 경험이 있어요. 그때 배운 건, 시작 전에 먼저 물어봐야 한다는 거였어요.", tags: ["경험질문", "신뢰테스트"] },
      { id: 10, cat: "면접", q: "마지막으로 하고 싶은 말 있으세요?", general: "오늘 좋은 기회 주셔서 감사합니다.", intent: "마지막 인상을 어떻게 남기는지, 그리고 이 시간을 주도적으로 쓸 수 있는 사람인지를 보는 거예요.", oseonghu: "오늘 대화에서 제가 이 회사에서 배울 게 분명히 있겠다는 확신이 생겼어요. 한 가지만 여쭤봐도 될까요?", tags: ["마무리순간", "첫인상"] },

      // 직장
      { id: 11, cat: "직장", q: "요즘 어때요?", general: "바쁘긴 한데 잘 지내고 있어요.", intent: "단순한 안부가 아니라 '업무 상태 파악' 또는 '관계 신호'일 수 있어요. 특히 상사가 물으면 현재 업무량·컨디션을 체크하는 거예요.", oseonghu: "○○ 건 마무리 단계라 조금 정신없는데, 오히려 배우는 게 많아서 좋아요. 혹시 뭔가 확인하고 싶으신 거 있으세요?", tags: ["숨은의도", "업무체크", "관계신호"] },
      { id: 12, cat: "직장", q: "이 부분 어떻게 생각해요?", general: "좋은 것 같아요.", intent: "단순한 의견 요청이 아니라 '내 판단을 검증해달라'는 신호일 수 있어요. 무조건 동의하면 오히려 신뢰를 잃어요.", oseonghu: "전체적으로 방향은 좋은데, ○○ 부분에서 한 가지 질문이 생겼어요. [구체적 질문]. 이 부분만 확인되면 완성도가 확 올라갈 같이요.", tags: ["숨은의도", "업무체크"] },
      { id: 13, cat: "직장", q: "다음번엔 이렇게 해줄 수 있어요?", general: "네, 알겠습니다.", intent: "이건 지시가 아니라 암묵적인 불만 표현일 수 있어요. 그냥 '알겠다'고 넘기면 이유를 모르고 같은 실수를 반복할 수 있어요.", oseonghu: "네, 그렇게 할게요. 혹시 이번에 아쉬웠던 부분이 어떤 점이었는지 알 수 있을까요? 더 잘 이해하고 싶어서요.", tags: ["숨은의도", "업무체크"] },
      { id: 14, cat: "직장", q: "바쁘지 않으면 이것 좀 도와줄 수 있어요?", general: "네, 도와드릴게요.", intent: "'바쁘지 않으면'은 사실 선택권을 주는 게 아니에요. 거의 부탁에 가깝거나, 상황에 따라 지시예요.", oseonghu: "지금 ○○ 작업 중인데, 오늘 오후 쯤이면 여유가 생길 것 같아요. 그때 도와드려도 될까요? 아니면 더 급하면 지금 하는 일 순서를 조정할게요.", tags: ["숨은의도", "업무체크"] },
      { id: 15, cat: "직장", q: "이 일, 해본 적 있어요?", general: "아니요, 처음이에요.", intent: "'할 수 있겠어?'를 돌려서 묻는 거예요. 단순한 경험 확인이 아니라 신뢰 여부를 확인하는 거예요.", oseonghu: "이 방식 그대로는 처음인데, 비슷한 구조의 일은 해봤어요. 처음이라 더 꼼꼼하게 할게요. 중간에 체크해주시면 더 좋을 것 같아요.", tags: ["신뢰테스트", "경험질문"] },
      { id: 16, cat: "직장", q: "보고서 언제 줄 수 있어요?", general: "내일까지 드릴게요.", intent: "데드라인 확인이지만, 동시에 업무 우선순위 파악 + 약속 신뢰도 테스트예요.", oseonghu: "내일 오후 3시까지 초안 드릴 수 있어요. 검토 시간 고려하면 그게 제일 효율적일 것 같아서요. 더 빠르게 필요하시면 우선순위 조정할게요.", tags: ["업무체크", "신뢰테스트"] },
      { id: 17, cat: "직장", q: "왜 이렇게 됐어요?", general: "제가 잘못 이해한 것 같아요.", intent: "책임 소재를 따지는 것보다 '앞으로 이런 일이 반복되지 않을 것인가'를 확인하는 경우가 많아요.", oseonghu: "제가 ○○ 단계에서 전제를 잘못 잡았어요. 다음부턴 그 전에 한번 맞춰보는 과정을 넣겠습니다.", tags: ["숨은의도", "업무체크"] },
      { id: 18, cat: "직장", q: "혼자 할 수 있겠어요?", general: "네, 할 수 있어요.", intent: "'도움이 필요하면 언제든지 말해' 라는 배려일 수도 있지만, 실제로는 '과신하지 마라'는 경고 신호일 수 있어요.", oseonghu: "기본 구조는 충분히 이해했고, ○○ 부분이 조금 불확실해요. 혼자 해보다가 막히면 바로 여쭤봐도 될까요?", tags: ["숨은의도", "신뢰테스트"] },
      { id: 19, cat: "직장", q: "다른 의견 있는 사람?", general: "(침묵 또는) 없습니다.", intent: "아무도 말 안 할 때, 누가 말하느냐가 그 사람의 존재감을 결정해요. 침묵은 동의가 아니라 회피로 읽혀요.", oseonghu: "한 가지만 여쭤봐도 될까요? ○○ 방향에서 ○○ 케이스는 어떻게 처리할까요? 제가 놓친 부분일 수도 있어서요.", tags: ["숨은의도", "관계신호"] },
      { id: 20, cat: "직장", q: "수고했어요.", general: "감사합니다.", intent: "단순한 인사처럼 보이지만, 관계가 만들어지는 순간이에요. 그냥 넘기면 아무것도 안 남아요.", oseonghu: "감사합니다. ○○ 부분에서 배운 게 많았어요. 다음엔 더 잘할 수 있을 것 같아요.", tags: ["마무리순간", "관계신호"] },

      // 관계·인상
      { id: 21, cat: "관계", q: "어떻게 알고 오셨어요?", general: "인터넷에서 찾았어요.", intent: "'누가 소개했느냐'로 신뢰도를 먼저 평가해요. 소개 경로가 첫 인상의 맥락이 되거든요.", oseonghu: "○○를 통해 알게 됐어요. 이름을 들었을 때부터 한번 만나보고 싶었거든요.", tags: ["첫인상", "관계신호"] },
      { id: 22, cat: "관계", q: "무슨 일 하세요?", general: "○○ 회사 다녀요.", intent: "직함이나 회사보다 '어떤 가치를 만드는 사람'인지로 자신을 정의하는 게 훨씬 기억에 남아요.", oseonghu: "사람들이 원하는 걸 빠르게 파악하고, 그걸 말로 정리하는 일을 좋아해요. 지금은 ○○에서 그걸 하고 있고요.", tags: ["첫인상", "자기표현"] },
      { id: 23, cat: "관계", q: "연락처 교환해요.", general: "네, 드릴게요.", intent: "단순한 연락처 요청이 아니라 '관계를 이어가겠다'는 의도예요. 여기서 어떤 인상을 남기느냐가 이후 관계를 결정해요.", oseonghu: "좋아요. 저는 카카오가 편한데, 혹시 연락 드려도 될까요? [이름과 함께 저장 요청]", tags: ["관계신호", "첫인상"] },
      { id: 24, cat: "관계", q: "시간 있어요?", general: "네, 뭔가요?", intent: "'시간'을 묻는 게 아니라 '내 말을 들어줄 의향이 있어요?'를 확인하는 거예요.", oseonghu: "지금 잠깐이면 돼요. 뭔가요? (먼저 내용을 확인하고 시간을 조정하는 게 더 나을 때도 있어요)", tags: ["숨은의도", "관계신호"] },
      { id: 25, cat: "관계", q: "솔직히 어떻게 생각해요?", general: "괜찮은 것 같아요.", intent: "'솔직히'라는 말은 이미 상대가 완충된 대답을 예상하고 있다는 신호예요. 그냥 괜찮다고 하면 신뢰를 잃어요.", oseonghu: "솔직하게 말씀드리면, ○○는 좋은데 ○○ 부분이 조금 걸렸어요. 제 생각이 틀릴 수도 있는데, 들어보시겠어요?", tags: ["숨은의도", "신뢰테스트"] },
      { id: 26, cat: "관계", q: "저 어때요? 솔직하게.", general: "좋아요, 잘 하시는 것 같아요.", intent: "이 질문을 하는 사람은 대부분 확신이 필요한 거예요. 그냥 좋다고 하면 오히려 공허하게 느껴져요.", oseonghu: "○○ 부분은 진짜 인상적이었어요. 그리고 솔직히 한 가지 더 말씀드리면, ○○는 조금 더 보여주셔도 좋을 것 같아요.", tags: ["관계신호", "가치관질문"] },
      { id: 27, cat: "관계", q: "취미가 뭐예요?", general: "음악 듣는 거요.", intent: "취미 자체보다 '이 사람이 어떤 방식으로 시간을 쓰는가'로 성격을 파악하는 거예요.", oseonghu: "대화하는 거요. 진짜로요. 상대방이 어떻게 생각하는지 듣는 게 재미있어서, 요즘은 다양한 분들이랑 이야기 나누는 걸 즐겨요.", tags: ["첫인상", "숨은의도"] },
      { id: 28, cat: "관계", q: "이 분야 얼마나 됐어요?", general: "3년 됐어요.", intent: "경력을 묻는 게 아니라 '신뢰할 수 있는 사람인가'를 가늠하는 거예요.", oseonghu: "업무로는 이제 시작이에요. 그 전에 개인적으로 관심 갖고 공부한 건 2년 됐고요. 아직 배우는 중이에요.", tags: ["신뢰테스트", "첫인상"] },
      { id: 29, cat: "관계", q: "어디 출신이에요?", general: "○○ 출신이에요.", intent: "지역이나 학교 자체보다 공통점 찾기, 배경 맥락 파악이 목적이에요.", oseonghu: "○○인데, 요즘은 서울에 완전히 적응했어요. 어떻게 연결점이 있으세요?", tags: ["첫인상", "관계신호"] },
      { id: 30, cat: "관계", q: "다음에 또 봐요.", general: "네, 봬요.", intent: "빈 인사일 수도 있지만, 진짜 관계로 이어질 수 있는 순간이기도 해요.", oseonghu: "저도요. ○○ 건은 꼭 다시 얘기 나눠보고 싶어요. 연락드려도 될까요?", tags: ["마무리순간", "관계신호"] },

      // 협상·설득
      { id: 31, cat: "협상", q: "좀 더 싸게 해줄 수 있어요?", general: "저희 가격은 이미 최선이에요.", intent: "가격이 아니라 '나를 특별하게 대우해달라'는 신호예요. 가치를 낮추지 않으면서도 상대가 특별함을 느끼게 해야 해요.", oseonghu: "가격 자체는 조정이 어렵지만, 대신 ○○를 추가로 해드릴 수 있어요. 이게 더 가치가 클 수 있거든요.", tags: ["숨은의도", "설득국면"] },
      { id: 32, cat: "협상", q: "다른 데서는 더 싸게 해준다고 했어요.", general: "그러면 거기서 하세요.", intent: "경쟁사 언급은 가격 흥정 신호이기도 하지만, '당신이 나를 설득할 기회'를 주는 것이기도 해요.", oseonghu: "그 조건이 어떤 건지 알 수 있을까요? 비교해서 저희가 어디서 더 드릴 수 있는지 말씀드릴게요.", tags: ["설득국면", "신뢰테스트"] },
      { id: 33, cat: "협상", q: "생각해볼게요.", general: "네, 연락주세요.", intent: "거의 90%는 '지금 당장 Yes는 아니다'는 신호예요. 여기서 멈추면 관계가 흐지부지돼요.", oseonghu: "물론이에요. 어떤 부분에서 고민이 있으신지 여쭤봐도 될까요? 그 부분을 먼저 해결하면 결정이 더 쉬우실 것 같아서요.", tags: ["숨은의도", "설득국면"] },
      { id: 34, cat: "협상", q: "이게 최선이에요?", general: "네, 최선입니다.", intent: "'최선'을 물어보는 건 사실 더 나은 조건을 기대한다는 신호예요. 그냥 Yes 하면 처음부터 충분히 준 게 아니었냐는 의심을 받아요.", oseonghu: "지금 드린 조건에서 ○○를 더 드리는 것까지는 가능해요. 그 이상은 솔직히 어렵고요. 어떤 부분이 제일 중요하세요?", tags: ["숨은의도", "설득국면"] },
      { id: 35, cat: "협상", q: "왜 이걸 해야 하죠?", general: "왜냐하면 ○○하기 때문이에요.", intent: "이유를 몰라서 묻는 게 아니라 '나를 납득시켜봐라'는 요청이에요. 이유보다 상대 입장에서의 이익을 먼저 말해야 해요.", oseonghu: "○○님 입장에서 가장 이득이 되는 부분부터 말씀드리면, ○○가 해결돼요. 관심 있으세요?", tags: ["설득국면", "숨은의도"] },
      { id: 36, cat: "협상", q: "다음에 하죠.", general: "알겠습니다.", intent: "'지금은 아니다'는 신호예요. 그냥 넘기면 '다음'은 안 와요. 지금 미루는 이유가 뭔지를 부드럽게 짚어야 해요.", oseonghu: "그렇게 하실 수 있어요. 다음에 가장 편하신 시간이 언제세요? 제가 맞추겠습니다.", tags: ["숨은의도", "설득국면", "마무리순간"] },
      { id: 37, cat: "협상", q: "보장이 돼요?", general: "저희는 최선을 다하겠습니다.", intent: "보장 여부보다 '불확실성이 두렵다'는 심리적 신호예요. 확신을 주는 것보다 리스크를 낮춰주는 게 더 효과적이에요.", oseonghu: "100% 보장은 어렵지만, 혹시 예상치 못한 일이 생기면 ○○ 방식으로 대응할 수 있어요. 이 정도면 충분하실까요?", tags: ["숨은의도", "설득국면"] },
      { id: 38, cat: "협상", q: "이 조건으로 하면 어때요?", general: "음, 어렵겠는데요.", intent: "상대가 먼저 조건을 제시했다면, 이건 협상 시작 신호예요. 바로 거절하면 대화가 닫혀요.", oseonghu: "○○는 가능한데, ○○ 부분은 대신 이렇게 하면 어떨까요? [대안 제시]", tags: ["설득국면", "신뢰테스트"] },
      { id: 39, cat: "협상", q: "급하게 해줄 수 있어요?", general: "해볼게요.", intent: "'급하다'는 건 우선순위를 높여달라는 신호예요. 가능/불가능보다 조건을 먼저 확인하는 게 더 신뢰를 줘요.", oseonghu: "가능해요. 급하게 하려면 ○○가 먼저 확정돼야 하는데, 그 부분 빠르게 확인해주실 수 있어요?", tags: ["업무체크", "설득국면"] },
      { id: 40, cat: "협상", q: "다른 곳도 알아보고 있어요.", general: "그러세요.", intent: "경쟁 압박이 아니라 '지금 결정하기 위한 정보를 충분히 갖고 싶다'는 신호일 수 있어요.", oseonghu: "당연히 그러셔야죠. 혹시 비교하실 때 저희 강점을 가장 잘 보여줄 부분이 있다면, ○○예요. 그 기준으로 보시면 도움이 될 것 같아요.", tags: ["숨은의도", "설득국면"] },

      // 자기표현
      { id: 41, cat: "자기표현", q: "자신의 강점이 뭐예요?", general: "열정적이고 책임감이 강해요.", intent: "강점을 나열하는 게 아니라, 그 강점이 상대에게 어떻게 도움이 되는지로 연결해야 기억에 남아요.", oseonghu: "상대가 말할 때 그 안의 진짜 의도를 빠르게 읽어요. 덕분에 대화가 빠르게 핵심으로 가는 편이에요.", tags: ["자기표현", "신뢰테스트"] },
      { id: 42, cat: "자기표현", q: "어떤 분위기에서 일이 잘 돼요?", general: "조용하고 집중할 수 있는 환경이요.", intent: "업무 스타일을 파악해서 팀 핏을 보는 거예요. 너무 '혼자' 강조하면 팀워크 의심받을 수 있어요.", oseonghu: "방향이 명확할 때 집중력이 올라가요. 그래서 시작 전에 목적이 정리되면 혼자든 함께든 잘 돼요.", tags: ["자기표현", "가치관질문"] },
      { id: 43, cat: "자기표현", q: "본인만의 차별점이 뭐라고 생각해요?", general: "저는 다양한 경험을 해서 폭넓은 시각을 가지고 있어요.", intent: "폭넓은 경험은 누구나 말해요. 상대가 기억하는 건 딱 하나의 구체적인 특징이에요.", oseonghu: "대화 중에 상대방이 말하지 않은 것까지 읽는 편이에요. 그게 저만의 방식인 것 같아요.", tags: ["자기표현", "신뢰테스트"] },
      { id: 44, cat: "자기표현", q: "스트레스 받으면 어떻게 해요?", general: "운동하거나 음악 들어요.", intent: "회복 능력과 자기 인식 수준을 보는 질문이에요. 취미 나열보다 어떻게 리셋하는지가 핵심이에요.", oseonghu: "일단 그 상황에서 잠깐 빠져나와요. 머리 속에서 계속 돌리는 것보다 환기가 빠르다는 걸 알아서요. 그 다음에 다시 보면 보통 더 잘 보여요.", tags: ["자기표현", "가치관질문"] },
      { id: 45, cat: "자기표현", q: "리더십 경험 있어요?", general: "학교에서 동아리 회장을 했었어요.", intent: "직책이 아니라 어떤 방식으로 사람들을 움직였는지가 핵심이에요.", oseonghu: "공식 직책보다, 방향이 안 잡힐 때 먼저 의견을 꺼내거나 사람들을 연결하는 역할을 해온 것 같아요.", tags: ["경험질문", "자기표현"] },
      { id: 46, cat: "자기표현", q: "어떤 사람이라고 주변에서 얘기해요?", general: "열심히 한다고 해요.", intent: "자기 인식보다 타인이 어떻게 보는지, 즉 사회적 자아를 보는 질문이에요.", oseonghu: "'말을 잘 들어준다'는 얘기를 자주 들어요. 듣는 것도 잘 하는 거라고 생각해요.", tags: ["숨은의도", "자기표현"] },
      { id: 47, cat: "자기표현", q: "어떤 가치관을 갖고 있어요?", general: "성실함과 정직함을 중요하게 생각해요.", intent: "가치관 자체보다 그 가치관이 어떤 행동으로 나타나는지를 보는 거예요.", oseonghu: "이해하지 못하면서 넘어가지 않는 거요. 모르면 물어보고, 확인하고 가는 게 결국 더 빠르다고 믿어요.", tags: ["가치관질문", "자기표현"] },
      { id: 48, cat: "자기표현", q: "왜 이 일을 하고 싶어요?", general: "이 분야에 관심이 생겨서요.", intent: "'관심'은 이유가 안 돼요. 그 관심이 어디서 왔는지, 어떤 경험이 연결됐는지가 신뢰를 만들어요.", oseonghu: "사람들이 원하는 걸 말하기 전에 파악하는 게 좋아서요. 이 일이 그 감각을 제일 잘 쓸 수 있는 자리인 것 같았어요.", tags: ["가치관질문", "경험질문"] },
      { id: 49, cat: "자기표현", q: "더 나아지려면 뭐가 필요하다고 생각해요?", general: "더 많은 경험이 필요한 것 같아요.", intent: "'경험'은 모두가 하는 말이에요. 자기 인식이 얼마나 깊은지가 드러나는 질문이에요.", oseonghu: "아직 모르는 것들을 '모른다'고 빠르게 인식하는 능력이요. 그게 빠르면 빠를수록 더 빨리 채울 수 있거든요.", tags: ["가치관질문", "자기표현"] },
      { id: 50, cat: "자기표현", q: "마지막으로 본인을 한 문장으로 표현해주세요.", general: "열심히 하는 사람입니다.", intent: "마지막 한 문장이 가장 오래 기억돼요. 그냥 끝내지 말고, 이 사람을 기억할 이유를 한 줄로 만들어야 해요.", oseonghu: "이 질문, 저는 이렇게 들었어요 — 라고 말할 수 있는 사람이요.", tags: ["마무리순간", "자기표현"] },
    ];

    function renderCard(q, isOpen = false) {
      const openClass = isOpen ? ' open' : '';
      const tagsHtml = q.tags && q.tags.length > 0
        ? `<div class="card-tags">${q.tags.map(t => `<span class="card-tag tag-${t}">#${t}</span>`).join('')}</div>`
        : '';

      return `<div class="card${openClass} cat-${q.cat}" data-id="${q.id}" data-cat="${q.cat}" onclick="toggleCard(this)">
    <div class="card-header">
      <div class="card-num">${q.id}</div>
      <div class="card-meta">
        <div class="card-category">${q.cat}</div>
        <div class="card-question">${q.q}</div>
        ${tagsHtml}
      </div>
      <div class="card-toggle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="card-body">
      <div class="card-inner">
        <div class="divider"></div>
        <div class="intent-tag">💡 숨은 의도: ${q.intent}</div>
        <div class="answer-block">
          <div class="answer-label label-general">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            일반적인 답변
          </div>
          <div class="answer-text">${q.general}</div>
        </div>
        <div class="answer-block">
          <div class="answer-label label-oseonghu">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            저라면, 이렇게 답할래요.
          </div>
          <div class="answer-text highlight">${q.oseonghu}</div>
        </div>
      </div>
    </div>
  </div>`;
    }

    const categories = {
      '면접': '면접 질문',
      '직장': '직장 대화',
      '관계': '관계·인상',
      '협상': '협상·설득',
      '자기표현': '자기표현',
    };

    let activeCat = 'all';
    let searchQuery = '';

    function render() {
      const container = document.getElementById('questionsContainer');
      const queryLower = searchQuery.toLowerCase();
      let filtered = questions.filter(q => {
        const catMatch = activeCat === 'all' || q.cat === activeCat;
        const searchMatch = !searchQuery ||
          (q.q && q.q.toLowerCase().includes(queryLower)) ||
          (q.general && q.general.toLowerCase().includes(queryLower)) ||
          (q.intent && q.intent.toLowerCase().includes(queryLower)) ||
          (q.oseonghu && q.oseonghu.toLowerCase().includes(queryLower));
        return catMatch && searchMatch;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto var(--space-4);color:var(--color-text-faint)"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><p>검색 결과가 없어요.</p></div>';
        return;
      }

      const isSearching = searchQuery.length > 0;

      if (activeCat === 'all' && !isSearching) {
        let html = '';
        Object.entries(categories).forEach(([cat, label]) => {
          const catQs = filtered.filter(q => q.cat === cat);
          if (catQs.length > 0) {
            html += `<div class="section-header"><h2 class="section-title">${label}</h2><span class="section-count">${catQs.length}개</span></div>`;
            html += `<div class="questions-grid">${catQs.map(q => renderCard(q, false)).join('')}</div>`;
          }
        });
        container.innerHTML = html;
      } else {
        const sectionTitle = isSearching ? '검색 결과' : (categories[activeCat] || activeCat);
        container.innerHTML = `<div class="section-header"><h2 class="section-title">${sectionTitle}</h2><span class="section-count">${filtered.length}개</span></div><div class="questions-grid">${filtered.map(q => renderCard(q, false)).join('')}</div>`;
      }
    }

    function toggleCard(el) {
      el.classList.toggle('open');
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCat = btn.dataset.cat;
        render();
      });
    });

    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      render();
    });

    render();

    // Theme toggle
    (function () {
      const t = document.querySelector('[data-theme-toggle]'), r = document.documentElement;
      let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
      r.setAttribute('data-theme', d);
      if (t) t.addEventListener('click', () => {
        d = d === 'dark' ? 'light' : 'dark';
        r.setAttribute('data-theme', d);
        t.innerHTML = d === 'dark' ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>' : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      });
    })();
  </script>
</body>

</html>
